services:
  teilekiste:
    build: .
    container_name: teilekiste
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_URL_INTERNAL: ${NEXTAUTH_URL_INTERNAL:-http://127.0.0.1:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-super-secret}
      DATABASE_URL: ${DATABASE_URL:-file:/data/sqlite/app.db}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      ATTACHMENT_DIR: ${ATTACHMENT_DIR:-/data/attachments}
      BACKUP_DIR: ${BACKUP_DIR:-/data/backups}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-10}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
      RUN_SEED_ON_STARTUP: ${RUN_SEED_ON_STARTUP:-0}
    volumes:
      - teilekiste_data:/data
    restart: unless-stopped

volumes:
  teilekiste_data:
